version: 0.2

env:
  variables:
    AWS_REGION: ap-northeast-2
    ECR_REPO_URI: 160885260227.dkr.ecr.ap-northeast-2.amazonaws.com/aivle-back-app

phases:
  install:
    runtime-versions:
      java: corretto21
  pre_build:
    commands:
      - chmod +x gradlew
      - |
        python3 - <<'PY'
        import yaml
        from pathlib import Path

        class UniqueKeyLoader(yaml.SafeLoader):
          pass

        def construct_mapping(loader, node, deep=False):
          mapping = {}
          for key_node, value_node in node.value:
            key = loader.construct_object(key_node, deep=deep)
            if key in mapping:
              line = key_node.start_mark.line + 1
              raise ValueError(f"Duplicate YAML key '{key}' at line {line}")
            mapping[key] = loader.construct_object(value_node, deep=deep)
          return mapping

        UniqueKeyLoader.add_constructor(
          yaml.resolver.BaseResolver.DEFAULT_MAPPING_TAG,
          construct_mapping,
        )

        targets = [
          Path("src/main/resources/application.yaml"),
          Path("src/main/resources/application-dev.yaml"),
          Path("src/main/resources/application-prod.yaml"),
          Path("src/main/resources/application-perf.yaml"),
          Path("src/test/resources/application-test.yaml"),
        ]

        for target in targets:
          if not target.exists():
            continue
          with target.open("r", encoding="utf-8") as f:
            yaml.load(f, Loader=UniqueKeyLoader)
          print(f"[YAML CHECK] OK: {target}")
        PY
      - ./gradlew --version
      - chmod +x scripts/*.sh
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}"
      - REPO_HOST="${ECR_REPO_URI%%/*}"
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REPO_HOST"
      - docker pull "$ECR_REPO_URI:latest" || true
  build:
    commands:
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}"
      - rm -rf build/test-results/test build/reports/tests/test
      - |
        set +e
        SPRING_PROFILES_ACTIVE=test JWT_PRIVATE_KEY_PATH=src/test/resources/jwt/private.pem JWT_PUBLIC_KEY_PATH=src/test/resources/jwt/public.pem JWT_CURRENT_KID=test-key ./gradlew test --stacktrace --warn -PexcludeTags=integration -PexcludeIntegrationByName=true --tests "com.aivle.project.auth.*" --tests "com.aivle.project.company.*"
        TEST_EXIT=$?
        if [ "$TEST_EXIT" -ne 0 ]; then
          echo "[ERROR] test task failed. Dumping failing test cases from XML reports..."
          if [ -d build/test-results/test ]; then
            grep -R -n "<testcase .*<failure\\|<testcase .*<error\\|<failure\\|<error" build/test-results/test/TEST-*.xml || true
          else
            echo "[WARN] build/test-results/test directory not found"
          fi
        fi
        exit "$TEST_EXIT"
      - ./gradlew bootJar -x test
      - APP_BOOT_JAR="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
      - 'test -n "$APP_BOOT_JAR" || (echo "[ERROR] bootJar 산출물을 찾지 못했습니다: build/libs" && exit 1)'
      - cp "$APP_BOOT_JAR" build/libs/app.jar
      - ls -lh build/libs
      - docker build --cache-from "$ECR_REPO_URI:latest" -t "$ECR_REPO_URI:$IMAGE_TAG" -t "$ECR_REPO_URI:latest" .
      - touch .image_built
  post_build:
    commands:
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}"
      - |
        if [ ! -f .image_built ]; then
          echo "[INFO] image build was not completed in BUILD phase. Skip docker push."
          exit 0
        fi
        docker image inspect "$ECR_REPO_URI:$IMAGE_TAG" >/dev/null
        docker push "$ECR_REPO_URI:$IMAGE_TAG"
        docker push "$ECR_REPO_URI:latest"
        echo "APP_IMAGE=$ECR_REPO_URI:$IMAGE_TAG" > image-uri.env

artifacts:
  files:
    - appspec.yml
    - image-uri.env
    - build/libs/app.jar
    - docker-compose.app.yml
    - scripts/**/*

cache:
  paths:
    - '/root/.gradle/caches/**/*'
    - '/root/.gradle/wrapper/**/*'
